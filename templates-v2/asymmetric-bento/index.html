<!doctype html>
<html><head><meta charset='utf-8'/><meta name='viewport' content='width=device-width,initial-scale=1'/><script src='https://cdn.tailwindcss.com'></script>
<link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
<link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap' rel='stylesheet'>
<title>Asymmetric Bento</title><style>body{font-family:'Space Grotesk',system-ui,sans-serif}</style></head>
<body class='bg-zinc-950 text-zinc-100'>
<main class='max-w-7xl mx-auto p-8'>
  <h1 class='text-4xl md:text-5xl font-bold'>Asymmetric Bento Grid</h1>
  <p class='mt-2 text-zinc-300'>Proof modules in unequal card sizes. Great for busy, credibility-heavy service brands.</p>
  <section class='mt-8 grid grid-cols-1 md:grid-cols-7 gap-4'>
    <article class='md:col-span-4 rounded-2xl p-7 bg-fuchsia-400 text-zinc-950'>
      <h2 class='text-3xl font-bold'>Main Offer + Primary CTA</h2><p class='mt-2 font-medium'>Hero copy and conversion action anchored here.</p>
    </article>
    <article class='md:col-span-3 rounded-2xl overflow-hidden relative border border-zinc-800 min-h-[180px]'>
      <img src='https://images.unsplash.com/photo-1449824913935-59a10b8d2000?auto=format&fit=crop&w=1200&q=80' class='absolute inset-0 w-full h-full object-cover'><div class='absolute inset-0 bg-black/40'></div>
      <div class='relative p-6 font-semibold text-white'>City/market context card</div>
    </article>
    <article class='md:col-span-2 rounded-2xl border border-zinc-800 p-6'>Reviews</article>
    <article class='md:col-span-2 rounded-2xl border border-zinc-800 p-6'>Service Areas</article>
    <article class='md:col-span-3 rounded-2xl border border-zinc-800 p-6'>Process + timeline</article>
    <article class='md:col-span-7 rounded-2xl border border-zinc-800 p-6'>Case-study strip / before-after snapshots</article>
  </section>
</main>
</body></html>
