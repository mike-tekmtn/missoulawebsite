<!doctype html>
<html><head><meta charset='utf-8'/><meta name='viewport' content='width=device-width,initial-scale=1'/><script src='https://cdn.tailwindcss.com'></script>
<link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
<link href='https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap' rel='stylesheet'>
<title>Map First Service Area</title><style>body{font-family:Manrope,system-ui,sans-serif}</style></head>
<body class='bg-emerald-950 text-emerald-50'>
<main class='max-w-7xl mx-auto p-8'>
  <header><p class='text-lime-300 text-xs uppercase tracking-wider'>Map-First Archetype</p><h1 class='text-4xl font-extrabold mt-2'>Coverage-Led Conversion Layout</h1></header>
  <section class='mt-8 grid lg:grid-cols-5 gap-4'>
    <div class='lg:col-span-3 rounded-2xl overflow-hidden border border-emerald-800 relative min-h-[380px] bg-emerald-900/20'>
      <iframe
        title='Missoula service area map'
        class='absolute inset-0 w-full h-full'
        loading='lazy'
        referrerpolicy='no-referrer-when-downgrade'
        src='https://maps.google.com/maps?q=Missoula,%20MT&z=10&output=embed'>
      </iframe>
      <div class='absolute top-4 left-4 bg-emerald-900/85 rounded-lg px-3 py-2 text-sm'>Service Coverage Map</div>
    </div>
    <aside class='lg:col-span-2 rounded-2xl border border-emerald-800 p-6 bg-emerald-900/35'>
      <h2 class='text-2xl font-bold'>Areas We Serve</h2>
      <ul class='mt-4 grid grid-cols-2 gap-2 text-emerald-100'><li>Missoula</li><li>Lolo</li><li>Bonner</li><li>Florence</li><li>East Missoula</li><li>Frenchtown</li></ul>
      <button class='mt-6 rounded-lg bg-lime-400 text-emerald-950 px-4 py-2.5 font-bold'>Check Availability</button>
    </aside>
  </section>
</main>
</body></html>
