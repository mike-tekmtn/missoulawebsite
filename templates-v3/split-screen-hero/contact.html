<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Split-Screen Hero • Contact</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap' rel='stylesheet'>
  <style>body{font-family:Montserrat,system-ui,sans-serif}</style>
</head>
<body class="bg-slate-950 text-slate-100">
  <header class="max-w-7xl mx-auto px-6 py-5 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
    <div class="font-bold text-lg tracking-tight">Template v3 • Split-Screen Hero</div>
    <nav class="text-sm text-slate-300 flex flex-wrap gap-4">
      <a href="index.html" class="hover:text-white">Home</a>
      <a href="services.html" class="hover:text-white">Services</a>
      <a href="about.html" class="hover:text-white">About</a>
      <a href="contact.html" class="text-white">Contact</a>
    </nav>
  </header>

  <main class="max-w-5xl mx-auto px-6 pb-12">
    <section class="rounded-2xl border border-slate-800 bg-slate-900/60 p-8 md:p-10">
      <p class="text-cyan-300 text-xs uppercase tracking-[0.18em] font-semibold">Contact</p>
      <h1 class="mt-3 text-4xl md:text-5xl font-extrabold">Request an Estimate</h1>
      <p class="mt-4 text-slate-300">Consistent style-system form block with clear conversion action.</p>

      <form class="mt-6 grid md:grid-cols-2 gap-3">
        <input class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2" placeholder="Name" />
        <input class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2" placeholder="Email" />
        <input class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 md:col-span-2" placeholder="Phone" />
        <textarea class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 md:col-span-2" rows="5" placeholder="Project details"></textarea>
        <button type="button" class="inline-flex w-fit rounded-lg bg-cyan-400 text-slate-900 font-bold px-5 py-3 md:col-span-2">Submit Request</button>
      </form>
    </section>
  </main>
</body>
</html>
