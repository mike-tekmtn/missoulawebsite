</style></head><body><main class='wrap'><a href='index.html' class='text-cyan-300'>← Back</a><h1 class='text-3xl font-bold mt-3'>Testimonial Carousel</h1><div id='t' class='rounded-xl border border-slate-700 p-6 mt-6 min-h-[150px]'></div><div class='mt-3 flex gap-2'><button id='p' class='px-3 py-2 border rounded'>Prev</button><button id='n' class='px-3 py-2 border rounded'>Next</button></div><script>const arr=['“Fast and clear communication.”','“Lead quality improved quickly.”','“Best redesign we have had.”'];let i=0;const t=document.getElementById('t');function r(){t.textContent=arr[i]}r();p.onclick=()=>{i=(i+arr.length-1)%arr.length;r()};n.onclick=()=>{i=(i+1)%arr.length;r()};</script></main></body></html>
