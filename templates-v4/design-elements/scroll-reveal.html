<!doctype html><html><head><meta charset='utf-8'/><meta name='viewport' content='width=device-width,initial-scale=1'/><script src='https://cdn.tailwindcss.com'></script><style>
body{background:#020617;color:#e2e8f0;font-family:Inter,system-ui,sans-serif}
.wrap{max-width:1000px;margin:0 auto;padding:24px}
.reveal{opacity:0;transform:translateY(14px);transition:.45s ease}
.reveal.in{opacity:1;transform:none}
</style></head><body><main class='wrap'><a href='index.html' class='text-cyan-300'>← Back</a><h1 class='text-3xl font-bold mt-3'>Scroll Reveal</h1><div style='height:30vh'></div><div class='reveal rounded-xl border border-slate-700 p-6'>Card reveals on scroll</div><div style='height:40vh'></div><script>const io=new IntersectionObserver(es=>es.forEach(e=>e.isIntersecting&&e.target.classList.add('in')),{threshold:.2});document.querySelectorAll('.reveal').forEach(e=>io.observe(e));</script></main></body></html>
